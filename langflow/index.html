<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangFlow - 多言語プログラミング学習</title>
  <meta name="description" content="Python・JavaScript・Java・C++の4言語を比較しながら学ぶフローチャート型プログラミング入門。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-particles" aria-hidden="true">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  </div>

  <div class="app-layout">
    <!-- サイドバー -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">⬡</span>
          <span class="logo-text">LangFlow</span>
        </div>
        <div class="progress-container">
          <div class="progress-label">
            <span>進捗</span>
            <span id="progressPct">0%</span>
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>
      </div>

      <nav class="step-nav" role="navigation" aria-label="学習ステップ">
        <ul id="stepList"></ul>
      </nav>

      <div class="sidebar-footer">
        <div class="score-card">
          <div class="score-icon">🏆</div>
          <div class="score-info">
            <span class="score-label">スコア</span>
            <span class="score-value" id="totalScore">0</span>
          </div>
        </div>
        <button class="btn btn-reset" onclick="showResetConfirm()">進捗をリセット</button>
      </div>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main-content" id="mainContent">
      <header class="content-header">
        <button class="menu-btn" id="menuBtn" aria-label="メニュー">
          <span></span><span></span><span></span>
        </button>
        <div class="step-badge" id="stepBadge">STEP 1</div>
        <div class="concept-tag" id="conceptTag">入力と出力</div>
      </header>

      <!-- 言語切替タブ -->
      <div class="lang-switcher" id="langSwitcher" role="tablist" aria-label="言語選択"></div>

      <div class="content-area" id="contentArea"></div>

      <footer class="nav-footer">
        <button class="btn btn-secondary" id="prevBtn" onclick="navigate(-1)">
          <span class="btn-icon">←</span>前のステップ
        </button>
        <div class="step-dots" id="stepDots"></div>
        <button class="btn btn-primary" id="nextBtn" onclick="navigate(1)">
          次のステップ<span class="btn-icon">→</span>
        </button>
      </footer>
    </main>
  </div>

  <!-- 完了オーバーレイ -->
  <div class="complete-overlay" id="completeOverlay" style="display:none">
    <div class="complete-card">
      <div class="fireworks">
        <span>🎉</span><span>✨</span><span>🏆</span><span>✨</span><span>🎉</span>
      </div>
      <h1>全ステップ完了！</h1>
      <p>お疲れ様でした！</p>
      <div class="final-score">
        <span class="fs-label">最終スコア</span>
        <span class="fs-value" id="finalScore">0</span>
        <span class="fs-max" id="finalMax"></span>
      </div>
      <button class="btn btn-primary" onclick="restartAll()">もう一度挑戦する</button>
    </div>
  </div>

  <!-- リセット確認 -->
  <div class="modal-overlay" id="resetOverlay">
    <div class="modal">
      <div class="modal-icon">⚠️</div>
      <h2 class="modal-title">進捗をリセットしますか？</h2>
      <p class="modal-msg">すべてのスコアと回答履歴が削除されます。<br>この操作は取り消せません。</p>
      <div style="display:flex;gap:12px;justify-content:center">
        <button class="btn btn-secondary" onclick="closeReset()">キャンセル</button>
        <button class="btn btn-primary" onclick="confirmReset()">リセットする</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
